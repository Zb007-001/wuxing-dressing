name: 五行穿衣每日推送

on:
  schedule:
    # 6:00-9:00 北京时间窗口，三层触发提前抢跑
    - cron: '0 22 * * *'   #  6:00 第一枪
    - cron: '0 0 * * *'    #  8:00 第二枪
    - cron: '0 1 * * *'    #  9:00 保底枪
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write       # 需要写入仓库记录发送日期

# 保证同一时间只跑一个，避免重复推送
concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 推送五行穿衣建议
        env:
          TZ: Asia/Shanghai
        run: python wuxing_push.py

      - name: 记录发送日期（防止重复推送）
        if: success()
        run: |
          date '+%Y-%m-%d' > last_sent.txt
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'
          git add last_sent.txt
          git diff --staged --quiet || git commit -m 'record: push sent'
          git push
