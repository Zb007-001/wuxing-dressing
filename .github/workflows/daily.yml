name: 五行穿衣每日推送

on:
  schedule:
    # 北京时间每天早上 9:30 (UTC 1:30)，避开整点高峰避免延迟
    - cron: '30 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 推送五行穿衣建议
        env:
          TZ: Asia/Shanghai
        run: python wuxing_push.py
